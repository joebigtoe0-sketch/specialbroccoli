<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>$HODL — Proof of Patience</title>
<link rel="icon" href="public/diamond-fist.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink-900:#000000;
    --ink-800:#0A0A0F;
    --ink-700:#12121A;
    --ink-600:#1C1C26;
    --ink-500:#2A2A38;
    --ice-50:#F5FBFF;
    --ice-100:#DDEFFF;
    --ice-300:#A8D4FF;
    --ice-500:#6BB4FF;
    --ice-700:#3D7FCC;
    --prism-pink:#FF4DA6;
    --prism-orange:#FFA64D;
    --prism-yellow:#FFE14D;
    --prism-green:#4DFFA6;
    --prism-blue:#4DA6FF;
    --prism-purple:#A64DFF;
    --win:#4DFFA6;
    --loss:#FF5577;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--ink-900); color:var(--ice-100); }
  body {
    font-family:'Inter',sans-serif;
    font-size:15px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .mono { font-family:'Geist Mono',ui-monospace,Menlo,monospace; }
  .tnum { font-variant-numeric:tabular-nums; }

  /* faint grid overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events:none;
    z-index:0;
    mask-image: radial-gradient(ellipse 100% 80% at 50% 30%, black 30%, transparent 80%);
  }

  .gradient-prism {
    background: linear-gradient(90deg,#FF4DA6 0%,#FFA64D 20%,#FFE14D 40%,#4DFFA6 60%,#4DA6FF 80%,#A64DFF 100%);
  }
  .gradient-ice {
    background: linear-gradient(135deg,#F5FBFF 0%,#A8D4FF 50%,#6BB4FF 100%);
  }
  .text-prism {
    background: linear-gradient(90deg,#FF4DA6,#FFA64D,#FFE14D,#4DFFA6,#4DA6FF,#A64DFF);
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
  }
  .text-ice {
    background: linear-gradient(135deg,#F5FBFF 0%,#A8D4FF 50%,#6BB4FF 100%);
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
  }

  ::selection { background: rgba(107,180,255,0.35); color:var(--ice-50); }

  /* card */
  .card {
    background:var(--ink-800);
    border:1px solid var(--ink-600);
    border-radius:18px;
    transition: border-color .25s ease, box-shadow .25s ease, transform .25s ease;
  }
  .card:hover {
    border-color: rgba(107,180,255,0.4);
    box-shadow: 0 0 24px -4px rgba(107,180,255,0.25);
  }

  /* buttons */
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 18px;
    font-family:'Geist Mono',monospace;
    font-size:13px; font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
    transition: all .2s ease;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .btn-primary {
    background:var(--ice-100);
    color:var(--ink-900);
    border-color:var(--ice-100);
  }
  .btn-primary:hover {
    background:var(--ice-50);
    box-shadow: 0 0 30px -6px rgba(168,212,255,0.6);
    transform: translateY(-1px);
  }
  .btn-outline {
    background:transparent;
    color:var(--ice-100);
    border-color:var(--ink-500);
  }
  .btn-outline:hover {
    border-color:var(--ice-500);
    color:var(--ice-50);
  }
  .btn-prism {
    position:relative;
    background:var(--ink-900);
    color:var(--ice-100);
    border:1px solid var(--ink-500);
    overflow:hidden;
  }
  .btn-prism::before {
    content:'';
    position:absolute;
    inset:-1px;
    border-radius:10px;
    padding:1px;
    background: linear-gradient(90deg,#FF4DA6,#FFA64D,#FFE14D,#4DFFA6,#4DA6FF,#A64DFF);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity:0;
    transition: opacity .25s ease;
    pointer-events:none;
  }
  .btn-prism:hover::before, .btn-prism:focus-visible::before { opacity:1; }
  .btn-prism:hover { color:var(--ice-50); }

  /* nav */
  .nav-bracket {
    display:inline-flex; align-items:center; gap:0;
    color:var(--ice-100);
    font-family:'Geist Mono',monospace;
    font-size:12px; font-weight:500;
    letter-spacing:0.06em;
    padding:6px 8px;
    cursor:pointer;
    text-decoration:none;
    transition: color .2s ease;
  }
  .nav-bracket .br { color:var(--ink-500); transition: color .2s ease; }
  .nav-bracket:hover { color:var(--ice-50); }
  .nav-bracket:hover .br { color:var(--ice-500); }

  /* hero */
  .hero-h1 {
    font-family:'Geist Mono',monospace;
    font-weight:700;
    font-size: clamp(40px, 7.4vw, 84px);
    line-height: 0.96;
    letter-spacing: -0.025em;
    color:#fff;
    margin:0;
  }

  /* fist halo */
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }
  .fist-wrap { animation: float 6s ease-in-out infinite; }
  .fist-halo {
    position:absolute; inset:-16%;
    border-radius:50%;
    background: radial-gradient(circle at 50% 45%, rgba(168,212,255,0.6), rgba(107,180,255,0.25) 40%, transparent 70%);
    filter: blur(8px);
    z-index:0;
  }
  .fist-prism-ring {
    position:absolute; inset:-8%;
    border-radius:50%;
    padding:1px;
    background: conic-gradient(from 0deg,#FF4DA6,#FFA64D,#FFE14D,#4DFFA6,#4DA6FF,#A64DFF,#FF4DA6);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: 0.30;
    z-index:1;
    animation: spin 24s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* shimmer for hero text glow underlay */
  .hero-glow {
    position:absolute; left:50%; top:50%;
    transform: translate(-50%,-50%);
    width:80%; height:60%;
    background: radial-gradient(ellipse at center, rgba(107,180,255,0.18), transparent 70%);
    filter: blur(40px);
    z-index:-1;
    pointer-events:none;
  }

  /* dotted connector */
  .dotted-connector {
    position:absolute;
    top:50%; left:0; right:0;
    height:1px;
    background-image: linear-gradient(to right, var(--ink-500) 50%, transparent 0%);
    background-size: 12px 1px;
    background-repeat: repeat-x;
    transform-origin: left center;
    z-index:0;
  }

  /* fade-up entrance */
  .fade-up { opacity:0; transform: translateY(8px); transition: opacity .7s ease, transform .7s ease; }
  .fade-up.in { opacity:1; transform: translateY(0); }

  /* code */
  .code-block {
    background: #0d1117;
    border:1px solid var(--ink-600);
    border-radius:12px;
    overflow:hidden;
    font-family:'Geist Mono',monospace;
    font-size:13px;
    line-height:1.6;
  }
  .code-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px;
    background:#0a0d12;
    border-bottom:1px solid var(--ink-600);
    font-size:12px;
    color:var(--ice-300);
  }
  .code-body {
    padding:16px 18px;
    overflow-x:auto;
    color:#c9d1d9;
  }
  .code-body pre { margin:0; white-space:pre; }
  /* token colors (github dark default-ish) */
  .tok-k { color:#ff7b72; } /* keyword */
  .tok-s { color:#a5d6ff; } /* string */
  .tok-c { color:#8b949e; font-style:italic; } /* comment */
  .tok-n { color:#79c0ff; } /* number */
  .tok-f { color:#d2a8ff; } /* function */
  .tok-t { color:#ffa657; } /* type */
  .tok-v { color:#79c0ff; } /* variable highlight */

  /* leaderboard */
  table.lb { width:100%; border-collapse:separate; border-spacing:0; }
  table.lb th {
    text-align:left;
    font-family:'Geist Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-500);
    font-weight:600;
    padding:14px 16px;
    border-bottom:1px solid var(--ink-600);
    background:var(--ink-800);
    position:sticky; top:0;
    cursor:pointer;
    user-select:none;
    transition: color .15s;
  }
  table.lb th:hover { color:var(--ice-300); }
  table.lb th.sorted { color:var(--ice-100); }
  table.lb td {
    padding:14px 16px;
    border-bottom:1px solid var(--ink-700);
    font-family:'Geist Mono',monospace;
    font-size:13px;
    font-variant-numeric: tabular-nums;
    vertical-align:middle;
  }
  table.lb tbody tr { transition: background .15s; }
  table.lb tbody tr:hover { background: rgba(107,180,255,0.04); }
  .rank-cell { width:64px; }
  .rank-num { font-size:18px; color:var(--ice-100); font-weight:600; }
  .rank-top { color: #fff; }
  .top3 td:first-child { position:relative; }
  .top3 td:first-child::before {
    content:'';
    position:absolute;
    left:0; top:8px; bottom:8px;
    width:2px;
    background: linear-gradient(180deg,#FF4DA6,#FFA64D,#FFE14D,#4DFFA6,#4DA6FF,#A64DFF);
    border-radius:2px;
  }
  .top3 td { box-shadow: inset 0 0 0 0 transparent; }
  .top3:hover td { background: rgba(107,180,255,0.05); }

  .weight-bar {
    display:inline-block;
    height:4px;
    border-radius:2px;
    margin-left:10px;
    vertical-align: middle;
    background: linear-gradient(135deg,#F5FBFF,#A8D4FF,#6BB4FF);
    box-shadow: 0 0 8px -2px rgba(107,180,255,0.6);
  }

  .pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px;
    border:1px solid var(--ink-600);
    border-radius:999px;
    font-family:'Geist Mono',monospace;
    font-size:11px;
    color:var(--ice-300);
    letter-spacing:0.04em;
  }

  .copy-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink-700);
    border:1px solid var(--ice-500);
    color:var(--ice-50);
    padding:8px 16px;
    border-radius:8px;
    font-family:'Geist Mono',monospace;
    font-size:12px;
    z-index:100;
    box-shadow: 0 0 20px -4px rgba(107,180,255,0.4);
  }

  /* search input */
  .search-input {
    width:100%;
    background:var(--ink-800);
    border:1px solid var(--ink-600);
    border-radius:10px;
    padding:11px 14px 11px 38px;
    color:var(--ice-100);
    font-family:'Geist Mono',monospace;
    font-size:13px;
    outline:none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color:var(--ice-500); box-shadow: 0 0 0 3px rgba(107,180,255,0.12); }
  .search-input::placeholder { color:var(--ink-500); }

  /* small util */
  .container { max-width:1180px; margin:0 auto; padding:0 24px; }
  .section-eyebrow {
    display:flex; align-items:center; gap:10px;
    font-family:'Geist Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    color:var(--ice-300);
    text-transform:uppercase;
  }
  .section-title {
    font-family:'Geist Mono',monospace;
    font-weight:600;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: -0.02em;
    color:#fff;
    margin: 8px 0 6px;
    line-height:1.05;
  }
  .section-sub {
    color: rgba(221,239,255,0.6);
    max-width: 56ch;
    margin: 0;
    font-size:15px;
  }

  hr.divider {
    border:0; height:1px;
    background:linear-gradient(to right, transparent, var(--ink-500), transparent);
    margin:0;
  }

  /* mobile */
  @media (max-width: 860px) {
    .hide-md { display:none !important; }
    .container { padding: 0 16px; }
    .hero-h1 { font-size: clamp(34px, 13vw, 54px); line-height: 1; }
    .section-title { font-size: clamp(22px, 8vw, 34px); }
    .btn { padding: 10px 14px; font-size: 12px; }
    .code-body { padding: 12px; font-size: 12px; }
    table.lb th, table.lb td { padding: 10px 12px; }
  }
  @media (max-width: 520px) {
    .container { padding: 0 12px; }
    .pill { font-size: 10px; padding: 4px 8px; }
    .hero-h1 { font-size: clamp(30px, 12vw, 42px); }
    .section-sub { font-size: 14px; }
  }

  /* leaderboard mobile cards */
  .lb-mobile-card {
    background: var(--ink-800);
    border:1px solid var(--ink-600);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
  }
</style>
</head>
